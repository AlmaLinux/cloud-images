# Cloud-init datasource for Vagrant boxes.
# VirtualBox/VMware/libvirt have no cloud metadata service, so we use
# NoCloud (seed from filesystem or labeled ISO) with None as fallback.
# This ensures cloud-init activates and runs modules like growpart and
# resizefs even without an external metadata source.
datasource_list: [NoCloud, None]
network: {config: disabled}
ssh_pwauth: true
