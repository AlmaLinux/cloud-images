---
- name: Disable SSH reverse DNS lookup
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "(.*UseDNS.*)"
    line: "UseDNS no"
    backrefs: true
    state: present
    create: false

- name: Install additional packages
  ansible.builtin.dnf:
    install_weak_deps: "{{ false if ansible_facts['distribution_major_version'] | int >= 9 else omit }}"
    name:
      - cloud-init
      - cloud-utils-growpart
      - cifs-utils
      - jq
      - nfs-utils
      - rsync
      - tcpdump
      - tuned
    state: present

- name: Install Vagrant public SSH key
  when: ansible_facts['distribution_major_version'] | int <= 9
  ansible.posix.authorized_key:
    user: vagrant
    key: https://raw.githubusercontent.com/hashicorp/vagrant/main/keys/vagrant.pub
    state: present

# Temporary workaround error on fetching a key from a URL on AlmaLinux OS Kitten 10
# Error output: Error getting key from
# See: https://github.com/ansible-collections/ansible.posix/blob/main/plugins/modules/authorized_key.py
- name: Install Vagrant public SSH key
  when: ansible_facts['distribution_major_version'] == '10'
  ansible.posix.authorized_key:
    user: vagrant
    key: "{{ lookup('ansible.builtin.file', 'vagrant.pub') }}"
    state: present

- name: Enable cloud-init services
  service:
    name: "{{ item }}"
    enabled: true
  with_items:
    - cloud-config
    - cloud-init
    - cloud-init-local
    - cloud-final

- name: Change cloud-init user to vagrant
  replace:
    dest: /etc/cloud/cloud.cfg
    regexp: '^(\s+name:).*$'
    replace: '\1 vagrant'

- name: Configure cloud-init datasource for Vagrant
  ansible.builtin.copy:
    src: 99_vagrant.cfg
    dest: /etc/cloud/cloud.cfg.d/99_vagrant.cfg
    owner: root
    group: root
    mode: "0644"

- name: Check if growpart is already in cloud_init_modules
  ansible.builtin.shell: grep -q "^\s*- growpart$" /etc/cloud/cloud.cfg
  register: growpart_check
  changed_when: false
  failed_when: false

- name: Ensure growpart module is in cloud_init_modules before resizefs
  ansible.builtin.lineinfile:
    path: /etc/cloud/cloud.cfg
    line: '  - growpart'
    insertbefore: '^\s+- resizefs$'
    state: present
  when: growpart_check.rc != 0
